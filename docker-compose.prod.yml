services:
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/serubix-frontend:latest
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://${DOMAIN}/api
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - serubix

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/serubix-backend:latest
    expose:
      - "4000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - serubix

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - serubix

networks:
  serubix:
    driver: bridge
