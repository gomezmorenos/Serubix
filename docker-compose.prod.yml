services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-serubix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-serubix}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-serubix}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - serubix

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/serubix-backend:latest
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-serubix}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serubix}
      - FRONTEND_URL=https://${DOMAIN}
    env_file:
      - .env
    volumes:
      - tts_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - serubix

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/serubix-frontend:latest
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://${DOMAIN}/api
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - serubix

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - serubix

networks:
  serubix:
    driver: bridge

volumes:
  postgres_data:
  tts_storage:
