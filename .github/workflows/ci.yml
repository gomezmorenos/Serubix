name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'FrontEnd/**'
  pull_request:
    branches:
      - main
    paths:
      - 'FrontEnd/**'

jobs:
  test:
    name: Tests — FrontEnd
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FrontEnd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar tipos TypeScript
        run: npx tsc --noEmit

      - name: Ejecutar tests
        run: npm run test

  build:
    name: Build — FrontEnd
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: FrontEnd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build producción
        run: npm run build
