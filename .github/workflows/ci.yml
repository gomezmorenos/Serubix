name: CI

on:
  push:
    branches: [main]
    paths:
      - 'FrontEnd/**'
      - 'Backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'FrontEnd/**'
      - 'Backend/**'
      - '.github/workflows/ci.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Frontend ────────────────────────────────────────────────
  test-frontend:
    name: Tests — FrontEnd
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FrontEnd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar tipos TypeScript
        run: npx tsc --noEmit

      - name: Ejecutar tests
        run: npm run test

  build-frontend:
    name: Build — FrontEnd
    runs-on: ubuntu-latest
    needs: test-frontend
    defaults:
      run:
        working-directory: FrontEnd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build producción
        run: npm run build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-placeholder-auth-secret-32chars' }}

  # ── Backend ─────────────────────────────────────────────────
  check-backend:
    name: TypeScript + Build — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Verificar tipos TypeScript
        run: npx tsc --noEmit

      - name: Build producción
        run: npm run build

  test-backend-integration:
    name: Integración — Backend + PostgreSQL
    runs-on: ubuntu-latest
    needs: check-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: serubix
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'ci_test_password' }}
          POSTGRES_DB: serubix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U serubix"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: Backend

    env:
      DATABASE_URL: postgresql://serubix:${{ secrets.CI_DB_PASSWORD || 'ci_test_password' }}@localhost:5432/serubix_test
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'ci-jwt-secret-for-actions' }}
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Ejecutar migraciones
        run: npx prisma migrate deploy

      - name: Seed — planes Free y Pro
        run: npm run db:seed

      - name: Smoke test — verificar /health
        run: |
          npm run build
          node dist/index.js &
          sleep 3
          curl -sf http://localhost:4000/health | grep '"status":"ok"'
          kill %1
