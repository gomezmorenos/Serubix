services:
  frontend:
    build:
      context: ./FrontEnd
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    env_file:
      - .env
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
