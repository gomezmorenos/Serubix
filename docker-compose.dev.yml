services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-serubix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-serubix}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-serubix}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.dev
    working_dir: /app
    # npm install siempre (es idempotente; los módulos quedan cacheados en el volumen)
    # seed con || true para no bloquear si los datos ya existen
    command: >
      sh -c "npm install &&
             npx prisma generate &&
             npx prisma migrate deploy &&
             (npx ts-node prisma/seed.ts || true) &&
             npx ts-node-dev --respawn --transpile-only --poll src/index.ts"
    volumes:
      - ./Backend:/app
      - backend_modules:/app/node_modules
      - backend_storage:/app/storage
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-serubix}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-serubix}
      - FRONTEND_URL=http://localhost:3000
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./FrontEnd:/app
      - frontend_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
      # Polling necesario para hot-reload en bind mounts de macOS
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  postgres_data_dev:
  backend_modules:
  backend_storage:
  frontend_modules:
